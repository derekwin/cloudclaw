apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-agent-pool
  labels:
    app: opencode-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: opencode-agent
  template:
    metadata:
      labels:
        app: opencode-agent
    spec:
      containers:
        - name: opencode-agent
          image: opencode:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc", "sleep infinity"]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
