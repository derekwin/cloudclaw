apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudclaw-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/attach"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudclaw-rb
subjects:
  - kind: ServiceAccount
    name: cloudclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudclaw-role
